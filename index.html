<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 30px;
      max-width: 600px;
    }

    .icon {
      font-size: 70px;
      animation: rotate 3s linear infinite;
      display: inline-block;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      margin-top: 20px;
      font-size: 32px;
    }

    p {
      margin-top: 10px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .loader {
      margin: 25px auto 0;
      width: 120px;
      height: 6px;
      background: #1e293b;
      border-radius: 50px;
      overflow: hidden;
      position: relative;
    }

    .loader::before {
      content: "";
      position: absolute;
      width: 40%;
      height: 100%;
      background: #38bdf8;
      border-radius: 50px;
      animation: load 1.5s infinite;
    }

    @keyframes load {
      0% { left: -40%; }
      50% { left: 30%; }
      100% { left: 100%; }
    }

    .btn {
      margin-top: 25px;
      display: inline-block;
      padding: 10px 20px;
      background: #38bdf8;
      color: #0f172a;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    /* FOOTER */
    .footer {
      position: absolute;
      bottom: 15px;
      text-align: center;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="icon">⚙️</div>
    <h1>Website Sedang Maintenance</h1>
    <p>
      Kami sedang melakukan perbaikan dan peningkatan sistem agar pengalaman kamu lebih baik.
      Mohon tunggu sebentar ya 🙏
    </p>

    <div class="loader"></div>

    <a class="btn" href="javascript:location.reload()">Coba Lagi</a>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    © 2026 Onistore
  </div>

</body>
</html>
